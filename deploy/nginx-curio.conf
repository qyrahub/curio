# Curio nginx — reference config (apply manually with sudo; nginx is root zone).
# Two pieces: the SPA on curio.qyratech.com, and a /curio/ proxy on the existing
# api.qyratech.com server block.

# ---- 1) SPA: curio.qyratech.com ----
server {
    listen 80;
    server_name curio.qyratech.com;
    root /home/hyperai/curio/frontend/dist;
    index index.html;

    # SPA fallback: every route serves index.html (hash routing also fine)
    location / {
        try_files $uri $uri/ /index.html;
    }
    # static asset caching
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
# After certbot: it adds the listen 443 + ssl_certificate lines here automatically.

