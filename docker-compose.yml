# One command runs the whole product:  docker compose up -d
# Then open http://<this-host>:8200  (UI + API in one server).
services:
  curio:
    build: .
    container_name: curio
    restart: unless-stopped
    ports:
      - "8200:8200"
    env_file:
      - ./api/.env
    environment:
      - CURIO_STORE=mongo
      - CURIO_MONGO_URI=mongodb://mongo:27017
      - CURIO_MONGO_DB=curio
      - CURIO_LLM_API_KEY=${CURIO_LLM_API_KEY:-}
      - CURIO_ASK_MODEL=${CURIO_ASK_MODEL:-claude-3-5-haiku-20241022}
    volumes:
      - curio_images:/app/image_cache
      - curio_exports:/app/exports
      - curio_uploads:/app/uploads
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    container_name: curio-mongo
    restart: unless-stopped
    volumes:
      - curio_mongo:/data/db

volumes:
  curio_uploads:
  curio_images:
  curio_exports:
  curio_mongo:
